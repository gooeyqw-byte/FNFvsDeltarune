name: 非常神秘的测试
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  # ========== 任务1：系统信息收集 ==========
  system_check:
    runs-on: ubuntu-latest
    steps:
      - name: 显示操作系统信息
        run: uname -a
      - name: 显示当前时间
        run: date
      - name: 显示系统环境变量
        run: env | sort
      - name: 显示磁盘空间
        run: df -h
      - name: 显示内存信息
        run: free -m
      - name: 显示网络配置
        run: ifconfig || ip addr

  # ========== 任务2：矩阵策略（同时跑3个版本） ==========
  matrix_build:
    runs-on: ubuntu-latest
    needs: system_check
    strategy:
      matrix:
        node_version: [16, 18, 20]
        os: [ubuntu-latest]
    steps:
      - name: 打印当前矩阵参数
        run: |
          echo "当前 Node 版本: ${{ matrix.node_version }}"
          echo "当前操作系统: ${{ matrix.os }}"
      - name: 模拟安装 Node.js v${{ matrix.node_version }}
        run: |
          echo "正在安装 Node.js ${{ matrix.node_version }}..."
          sleep 2
          echo "安装完成！"
      - name: 创建临时文件测试
        run: |
          mkdir -p test_folder
          cd test_folder
          echo "Hello from Node ${{ matrix.node_version }}" > output.log
          cat output.log
      - name: 计算简单数学
        run: |
          for i in {1..5}; do
            echo "循环第 $i 次，平方值: $((i * i))"
          done

  # ========== 任务3：模拟代码构建 ==========
  build_process:
    runs-on: ubuntu-latest
    needs: matrix_build
    steps:
      - name: 初始化构建环境
        run: |
          echo "正在清理旧缓存..."
          echo "缓存清理完成！"
      - name: 下载依赖（模拟）
        run: |
          echo "正在下载 100 个依赖包..."
          for pkg in lodash react vue angular express; do
            echo "  - 已下载 $pkg@latest"
          done
          echo "所有依赖下载完成！"
      - name: 编译源代码（模拟）
        run: |
          echo "正在编译源代码..."
          sleep 3
          echo "编译成功！生成 dist 文件夹"
          mkdir -p dist
          echo "/* 编译后的代码 */" > dist/bundle.js
          echo "Hello World" > dist/index.html
      - name: 运行单元测试（模拟）
        run: |
          echo "正在运行 150 个测试用例..."
          echo "测试用例 1-50: ✅ 通过"
          echo "测试用例 51-100: ✅ 通过"
          echo "测试用例 101-150: ✅ 通过"
          echo "全部测试通过！覆盖率 100%"

  # ========== 任务4：部署模拟 ==========
  deploy_simulate:
    runs-on: ubuntu-latest
    needs: build_process
    steps:
      - name: 打包产物
        run: |
          tar -czf app.tar.gz dist/
          ls -lh app.tar.gz
      - name: 模拟上传到服务器
        run: |
          echo "正在上传 app.tar.gz 到生产服务器..."
          sleep 2
          echo "上传成功！服务器 IP: 192.168.1.100"
      - name: 模拟重启服务
        run: |
          echo "正在重启 Nginx 服务..."
          sleep 1
          echo "正在重启 Node 应用..."
          sleep 1
          echo "所有服务重启完成！"
      - name: 健康检查
        run: |
          echo "正在检查服务状态..."
          echo "✅ 服务运行正常"
          echo "✅ 响应时间: 12ms"

  # ========== 任务5：最终汇总报告 ==========
  final_report:
    runs-on: ubuntu-latest
    needs: [system_check, matrix_build, build_process, deploy_simulate]
    if: always()
    steps:
      - name: 生成构建报告
        run: |
          echo "========================================"
          echo "           🎉 所有任务执行完毕 🎉        "
          echo "========================================"
          echo "系统检查: ✅ 通过"
          echo "矩阵构建: ✅ 通过 (3个版本全部成功)"
          echo "代码构建: ✅ 通过"
          echo "部署模拟: ✅ 通过"
          echo "========================================"
          echo "总耗时: 约 15 秒"
          echo "状态: 完美运行！"
          echo "========================================"
      - name: 输出最终状态
        run: |
          echo "::notice title=部署成功::应用已成功部署到测试环境"
          echo "::notice title=访问地址::http://localhost:8080"
